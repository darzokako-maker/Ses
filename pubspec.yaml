name: pyroid_flutter_clone
description: "Flutter ile Gelişmiş Python IDE"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Versiyon uyuşmazlığını kökten çözen canlı repo bağlantısı:
  chaquopy:
    git:
      url: https://github.com/Chaquopy/chaquopy.git
      path: flutter

  code_text_field: ^1.1.0
  flutter_highlight: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
