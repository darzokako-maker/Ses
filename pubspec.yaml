name: pyroid_flutter_clone
description: "Flutter ile Gelişmiş Python IDE"
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Versiyon kilitlenmelerini önlemek için en esnek ve kararlı yöntem:
  chaquopy: any
  code_text_field: any
  flutter_highlight: any

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
