name: Flutter APK Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Java 17 Kurulumu
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Flutter Kurulumu
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'

    - name: Bağımlılıkları Temizle ve Çek
      run: |
        flutter clean
        flutter pub get

    - name: APK Derle (Release Mode)
      run: flutter build apk --release

    - name: APK Dosyasını Yayınla
      uses: actions/upload-artifact@v4
      with:
        name: Pyroid-Flutter-Final-APK
        path: build/app/outputs/flutter-apk/app-release.apk
        
